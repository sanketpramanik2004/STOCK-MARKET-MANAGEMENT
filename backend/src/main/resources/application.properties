spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=jdbc:mysql://localhost:3306/stock_management
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

alpha.vantage.api-key=${ALPHA_VANTAGE_API_KEY:}
alpha.vantage.base-url=https://www.alphavantage.co/query

jwt.secret=${JWT_SECRET:stockpulse-local-development-secret-change-before-production}
jwt.expiration-ms=86400000

openai.api-key=${OPENAI_API_KEY:}
openai.base-url=https://api.openai.com/v1
openai.model=gpt-4o

google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}
